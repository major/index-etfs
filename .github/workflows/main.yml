name: Main

on:
  push:
    branches:
      - main
  schedule:
      - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  id-token: write

jobs:
  update:
    name: Update ETF data
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Update ETF data
        run: uv run get-holdings

      - name: Commit and push if it changed
        run: |-
          git config user.name "Major Hayden"
          git config user.email "major@mhtx.net"
          git add tickers/*.txt watchlists/*.txt metadata/*.json README.md
          timestamp=$(date -u)
          git commit -m "Updating ETF data: ${timestamp}" || exit 0
          git clean -fxd
          git status
          git pull --rebase
          git push
